<!DOCTYPE html>
<html>
<head>
<meta charset=“UTF-8”>
<title>Exercise</title>

<style>
/* 表格 */
table {
  border-collapse: collapse;
  margin: 50px;
}

th, td {
  border: 2px solid black;
  padding: 10px;
  text-align: center;
  width: 80px;
}

/* header */
th {
  background-color: black;
  color: white;
}

/* 交錯顏色 */
tr:nth-child(odd) {
  background-color: yellow;
}

/* 固定div */
.fixed-box {
  position: fixed;
  top: 50px;
  right: 50px;
  border: 3px solid green;
  padding: 10px;
  width: 150px;
}
</style>

</head>

<body>

<table>
  <tr>
    <th>Firstname</th>
    <th>Lastname</th>
  </tr>
  <tr>
    <td>1</td>
    <td>1</td>
  </tr>
  <tr>
    <td>2</td>
    <td>2</td>
  </tr>
  <tr>
    <td>3</td>
    <td>3</td>
  </tr>
</table>

<div class=“fixed-box”>
  This div element has position: fixed;
</div>

</body>
</html>
